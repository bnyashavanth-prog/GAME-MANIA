<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Racers - 3D Platformer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow secondary"></div>

    <div class="container">
        <h1>NEON RACERS</h1>
        <p class="subtitle">Multiplayer 3D Platformer Speedrun</p>

        <form id="join-form">
            <div class="form-group">
                <label for="player-name">PLAYER NAME</label>
                <input type="text" id="player-name" placeholder="Enter your racer name" maxlength="15" required>
            </div>
            
            <div id="name-error" class="error">Please enter a valid name.</div>

            <div class="form-group" style="background: rgba(0,229,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,229,255,0.2); margin-top: 15px; margin-bottom: 25px;">
                <label for="room-code" style="color: #00e5ff;">PRIVATE ROOM (OPTIONAL)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="room-code" placeholder="Leave empty for Public Match" maxlength="8" style="text-transform: uppercase;">
                    <button type="button" id="generate-room-btn" style="background: rgba(0,229,255,0.2); border: 1px solid #00e5ff; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer;">Generate Link</button>
                </div>
                <div id="share-link-container" style="display: none; margin-top: 10px; font-size: 13px; color: #fff;">
                    <span style="opacity: 0.7;">Share this link: </span>
                    <input type="text" id="share-link" readonly style="background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; border: 1px solid rgba(255,255,255,0.2); color: #00e5ff; width: 100%; margin-top: 5px;">
                </div>
            </div>

            <div class="form-group">
                <label>SELECT LEVEL</label>
                <div class="level-grid" id="level-grid">
                    <!-- Levels generated by JS -->
                </div>
            </div>
            
            <div id="level-error" class="error">Please select a level.</div>

            <button type="submit" class="join-btn">JOIN RACE</button>
        </form>
    </div>

    <script>
        const levelNames = [
            "Tutorial Island", "Moving Platforms", "Sky Fortress", "Lava Keep",
            "The Gauntlet", "Crossroads", "Enemy Territory", "The Elevator",
            "Precision", "The Final Test"
        ];

        const grid = document.getElementById('level-grid');
        let selectedLevel = null;

        const urlParams = new URLSearchParams(window.location.search);
        const urlRoom = urlParams.get('room');
        const urlLevel = urlParams.get('level');

        if (urlRoom) {
            document.getElementById('room-code').value = urlRoom.toUpperCase();
        }

        // Generate level cards
        levelNames.forEach((name, index) => {
            const levelNum = index + 1;
            const card = document.createElement('div');
            card.className = 'level-card';
            if (urlLevel && parseInt(urlLevel) === levelNum) {
                card.classList.add('selected');
                selectedLevel = levelNum;
            }
            card.innerHTML = `
                <div class="level-num">${levelNum}</div>
                <div class="level-name">${name}</div>
            `;
            
            card.addEventListener('click', () => {
                // Deselect others
                document.querySelectorAll('.level-card').forEach(c => c.classList.remove('selected'));
                // Select this
                card.classList.add('selected');
                selectedLevel = levelNum;
                document.getElementById('level-error').style.display = 'none';
                updateShareLink();
            });
            
            grid.appendChild(card);
        });

        function updateShareLink() {
            const roomVal = document.getElementById('room-code').value.trim().toUpperCase();
            const container = document.getElementById('share-link-container');
            if (roomVal && selectedLevel) {
                const link = window.location.origin + window.location.pathname + '?room=' + encodeURIComponent(roomVal) + '&level=' + selectedLevel;
                document.getElementById('share-link').value = link;
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }

        document.getElementById('room-code').addEventListener('input', updateShareLink);

        document.getElementById('generate-room-btn').addEventListener('click', () => {
            if (!selectedLevel) {
                document.getElementById('level-error').style.display = 'block';
                return;
            }
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('room-code').value = code;
            updateShareLink();
            
            const linkInput = document.getElementById('share-link');
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(linkInput.value);
            } else {
                linkInput.select();
                try { document.execCommand('copy'); } catch(e) {}
            }
            
            const btn = document.getElementById('generate-room-btn');
            const oldText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.background = '#00ff88';
            btn.style.color = '#000';
            setTimeout(() => {
                btn.textContent = oldText;
                btn.style.background = 'rgba(0,229,255,0.2)';
                btn.style.color = '#fff';
            }, 2000);
        });

        // Form submission
        document.getElementById('join-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('player-name').value.trim();
            const room = document.getElementById('room-code').value.trim().toUpperCase();
            let hasError = false;

            if (!name) {
                document.getElementById('name-error').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('name-error').style.display = 'none';
            }

            if (!selectedLevel) {
                document.getElementById('level-error').style.display = 'block';
                hasError = true;
            }

            if (!hasError) {
                // Redirect to game
                let url = `game.html?name=${encodeURIComponent(name)}&level=${selectedLevel}`;
                if (room) url += `&room=${encodeURIComponent(room)}`;
                window.location.href = url;
            }
        });
    </script>
</body>
</html>
